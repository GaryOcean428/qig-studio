name: release

# OIDC Trusted Publishing to PyPI (no API token — id-token only).
# Precedent: qig-compute/.github/workflows/release.yml. Verified by the studio-remaining
# groundwork workflow (SHA pins resolve to the claimed tags; id-token scoped to the publish job).
#
# PREREQUISITE (owner-only, one-time, on pypi.org): register a Trusted Publisher (a
# "pending publisher" for the first release so it creates the project) for THIS project —
#   Owner: GaryOcean428 · Repository: qig-studio · Workflow: release.yml · Environment: pypi
# Publish qig-coordizer FIRST (qig-studio[kernel] pins qig-coordizer>=0.1.0). Tag v0.1.0 to fire.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python -m build
      - name: version matches release tag
        if: github.event_name == 'release'
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          TAG="${TAG_NAME#v}"
          BUILT=$(ls dist/*.whl | sed -E 's#.*/qig_studio-([0-9][^-]*)-.*#\1#' | head -1)
          [ "$BUILT" = "$TAG" ] || { echo "version mismatch: wheel '$BUILT' != tag '$TAG'"; exit 1; }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC — the ONLY credential; no PYPI_TOKEN anywhere
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
